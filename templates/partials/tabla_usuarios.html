<table>
    <thead>
        <tr>
            <th>Usuario</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
    {% for perfil in perfiles %}
        <tr>
            <td>{{ perfil.user.username }}</td>
            <td>{{ perfil.user.email }}</td>
            <td><span class="badge">{{ perfil.rol }}</span></td>
            <td>
                <a href="{% url 'editar_usuario' perfil.user.id %}" class="btn warning">Editar</a>
                <a href="{% url 'eliminar_usuario' perfil.user.id %}"
                   class="btn danger"
                   onclick="return confirm('¿Seguro que quieres eliminar a {{ perfil.user.username }}? Esta acción no se puede deshacer.')">
                   Eliminar
                </a>
            </td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="4">No hay usuarios</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
