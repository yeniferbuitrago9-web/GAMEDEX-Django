{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Perfil</title>

<style>
/* GENERAL */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #0f172a, #020617);
    color:white;
}
/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background: rgba(15,23,42,0.8);
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}
.navbar h1{ color:#00c6ff; margin:0; }
.navbar a{
    margin-left:15px;
    text-decoration:none;
    color:#ccc;
    padding:8px 15px;
    border-radius:8px;
    transition:0.3s;
}
.navbar a:hover{ background:#00c6ff; color:black; }
/* MAIN */
.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100vh - 70px);
}
/* FORM CARD */
.form-container{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    width:420px;
    box-shadow:0 0 30px rgba(0,198,255,0.2);
    animation: fadeIn 0.6s ease;
}
.form-container h2{ text-align:center; margin-bottom:25px; color:#00c6ff; }
/* INPUTS */
.form-group{ margin-bottom:15px; }
.form-group label{ font-size:14px; color:#aaa; }
.form-group input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
    transition:0.3s;
}
.form-group input:focus{
    border:1px solid #00c6ff;
    box-shadow:0 0 10px #00c6ff55;
}
/* BOTONES */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
    margin-top:10px;
}
.btn-guardar{ background:linear-gradient(45deg,#00c6ff,#0072ff); color:white; }
.btn-guardar:hover{ transform:scale(1.05); box-shadow:0 0 20px #00c6ff; }
.btn-cancelar{
    background:transparent;
    border:1px solid #aaa;
    color:#aaa;
    text-align:center;
    display:block;
    text-decoration:none;
}
.btn-cancelar:hover{
    background:#ff4d4d;
    border-color:#ff4d4d;
    color:white;
    box-shadow:0 0 15px #ff4d4d;
}
@keyframes fadeIn{
    from{ opacity:0; transform:translateY(30px); }
    to{ opacity:1; transform:translateY(0); }
}
.logo img{
    height:40px;
    width:auto;
    object-fit:contain;
    filter: drop-shadow(0 0 8px #00c6ff);
    transition:0.3s;
}
.logo img:hover{ transform:scale(1.1); filter: drop-shadow(0 0 15px #00c6ff); }
</style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <a href="{% url url_cancelar %}"><img src="{% static 'imagenes/logo.png' %}" alt="GAMEDEX"></a>
        <span>GAMEDEX</span>
    </div>

    <div>
        <a href="{% url url_cancelar %}">Dashboard</a>
        <a href="/logout/">Cerrar sesión</a>
    </div>
</div>

<div class="main">
    <div class="form-container">
        <h2>Editar Perfil</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Usuario</label>
                <input
    type="text"
    name="username"
    value="{{ user.username }}"
    required
    maxlength="150">
                
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email }}" required>
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input
    type="tel"
    name="telefono"
    value="{{ perfil.telefono|default:'' }}"
    required
    maxlength="10"
    pattern="[0-9]{10}"
    inputmode="numeric"
    oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)">
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" name="direccion" value="{{ perfil.direccion|default:'' }}" required>
            </div>

            <div class="form-group">
                <label>Nueva contraseña <span style="color:#aaa;font-weight:normal;">(dejar vacío para no cambiar)</span></label>
                <input type="password" name="password" placeholder="Nueva contraseña">
            </div>

            <button type="submit" class="btn btn-guardar">
                💾 Guardar cambios
            </button>

            <a href="{% url url_cancelar %}" class="btn btn-cancelar">
                ❌ Cancelar
            </a>
        </form>
    </div>
</div>

</body>
</html>
